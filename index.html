<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYAAH 글로벌 진출 전략 — 버전 선택</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --ink:#23201c;--ink-soft:#675e54;--paper:#f6f2ea;--paper-2:#ece4d6;
    --line:#dcd1c0;--accent:#7c5a3a;--accent-2:#a8784a;--white:#fffdf9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.7;letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;
    background-image:radial-gradient(circle at 18% 8%, #fff8 0, transparent 42%),radial-gradient(circle at 85% 92%, #e8dcc710 0, transparent 42%);
  }
  .wrap{max-width:720px;width:100%;text-align:center;}
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.3em;color:var(--accent-2);text-transform:uppercase;margin-bottom:18px;}
  h1{font-size:clamp(24px,4vw,36px);font-weight:800;line-height:1.3;letter-spacing:-.03em;margin-bottom:14px;}
  h1 .hl{color:var(--accent);}
  .sub{font-size:15px;color:var(--ink-soft);margin-bottom:40px;font-weight:500;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  a.card{
    display:block;text-decoration:none;background:var(--white);border:1px solid var(--line);
    border-radius:16px;padding:30px 26px;transition:.25s;text-align:left;
  }
  a.card:hover{transform:translateY(-4px);box-shadow:0 16px 38px -18px #7c5a3a55;border-color:var(--accent-2);}
  .badge{display:inline-block;font-size:12px;font-weight:700;color:var(--white);background:var(--accent-2);padding:4px 13px;border-radius:20px;margin-bottom:14px;letter-spacing:.04em;}
  .card.latest .badge{background:var(--accent);}
  a.card h2{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:7px;letter-spacing:-.02em;}
  a.card p{font-size:13px;color:var(--ink-soft);font-weight:400;line-height:1.6;}
  .arrow{margin-top:16px;font-size:13px;font-weight:700;color:var(--accent);}
  .foot{margin-top:34px;font-size:12px;color:var(--ink-soft);opacity:.7;}
  @media(max-width:640px){.cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Global Market Entry Strategy</div>
  <h1>HYAAH <span class="hl">글로벌 진출 전략</span></h1>
  <p class="sub">보고 싶은 버전을 선택하세요.</p>
  <div class="cards">
    <a class="card latest" href="ver2.html">
      <span class="badge">VER 2 · 최신</span>
      <h2>버전 2</h2>
      <p>가장 최근에 업데이트한 기획서입니다.</p>
      <div class="arrow">열어보기 →</div>
    </a>
    <a class="card" href="ver1.html">
      <span class="badge">VER 1</span>
      <h2>버전 1</h2>
      <p>최초 작성한 기획서입니다.</p>
      <div class="arrow">열어보기 →</div>
    </a>
  </div>
  <p class="foot">© HYAAH — Global Market Entry Strategy</p>
</div>
</body>
</html>
